<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Snake - Enhanced Edition</title>

<style>
body {
  margin:0;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

canvas {
  background:#181818;
  border:2px solid #444;
}

#ui {
  position:absolute;
  top:10px;
  color:white;
  font-size:18px;
}

</style>
</head>

<body>

<div id="ui"></div>
<canvas id="game" width="640" height="420"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const CELL = 20;
const COLS = canvas.width / CELL;
const ROWS = canvas.height / CELL;

// ---------------- MODES ----------------
const MODE_WRAP = 1;
const MODE_NORMAL = 2;
const MODE_CHAOS = 3;

const LEVEL_SPEED = {1:10, 2:15, 3:22};
const FOOD_OPTIONS = [1,3,5,10];

// ---------------- STATE ----------------
let state = "menu";

let mode = 1;
let level = 1;
let foodCount = 3;

let snake, dir, foods, score, walls, speed;

// ---------------- INIT ----------------
function resetGame(){
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0};
  score = 0;

  speed = LEVEL_SPEED[level];

  walls = [];
  if(mode === MODE_CHAOS){
    for(let i=0;i<30;i++){
      walls.push({
        x: Math.floor(Math.random()*COLS),
        y: Math.floor(Math.random()*ROWS)
      });
    }
    speed += Math.floor(Math.random()*3);
  }

  foods = [];
  for(let i=0;i<foodCount;i++){
    foods.push(spawnFood());
  }
}

// ---------------- FOOD SAFE SPAWN ----------------
function spawnFood(){
  while(true){
    let f = {
      x: Math.floor(Math.random()*COLS),
      y: Math.floor(Math.random()*ROWS)
    };

    let bad = snake.some(s=>s.x===f.x && s.y===f.y) ||
              foods?.some(ff=>ff?.x===f.x && ff?.y===f.y);

    if(!bad) return f;
  }
}

// ---------------- INPUT ----------------
document.addEventListener("keydown", e=>{

  if(state === "menu"){
    if(e.key==="Enter"){
      resetGame();
      state="game";
    }

    if(e.key==="ArrowUp") menuSelect = (menuSelect+2)%3;
    if(e.key==="ArrowDown") menuSelect = (menuSelect+1)%3;

    if(e.key==="ArrowRight"){
      if(menuSelect===0) mode = mode===3?1:mode+1;
      if(menuSelect===1) level = level===3?1:level+1;
      if(menuSelect===2) foodIndex = (foodIndex+1)%FOOD_OPTIONS.length;
    }

    if(e.key==="ArrowLeft"){
      if(menuSelect===0) mode = mode===1?3:mode-1;
      if(menuSelect===1) level = level===1?3:level-1;
      if(menuSelect===2) foodIndex = (foodIndex-1+FOOD_OPTIONS.length)%FOOD_OPTIONS.length;
    }

    foodCount = FOOD_OPTIONS[foodIndex];
    return;
  }

  if(e.key==="ArrowUp" && dir.y===0) dir={x:0,y:-1};
  if(e.key==="ArrowDown" && dir.y===0) dir={x:0,y:1};
  if(e.key==="ArrowLeft" && dir.x===0) dir={x:-1,y:0};
  if(e.key==="ArrowRight" && dir.x===0) dir={x:1,y:0};

  if(e.key==="Escape"){
    state="menu";
  }
});

// ---------------- GAME LOOP ----------------
function loop(){

  if(state==="menu"){
    drawMenu();
    requestAnimationFrame(loop);
    return;
  }

  update();
  draw();

  setTimeout(loop, 1000/speed);
}

// ---------------- UPDATE ----------------
function update(){

  let head = {
    x: snake[0].x + dir.x,
    y: snake[0].y + dir.y
  };

  // WRAP
  if(mode === MODE_WRAP){
    if(head.x<0) head.x=COLS-1;
    if(head.x>=COLS) head.x=0;
    if(head.y<0) head.y=ROWS-1;
    if(head.y>=ROWS) head.y=0;
  }

  // NORMAL BOUNDS = DIE
  if(mode === MODE_NORMAL){
    if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS){
      state="menu";
      return;
    }
  }

  // SELF COLLISION
  if(snake.some(p=>p.x===head.x && p.y===head.y)){
    state="menu";
    return;
  }

  // WALLS
  if(mode===MODE_CHAOS){
    if(walls.some(w=>w.x===head.x && w.y===head.y)){
      state="menu";
      return;
    }
  }

  snake.unshift(head);

  // FOOD
  let eaten = false;

  for(let i=0;i<foods.length;i++){
    if(head.x===foods[i].x && head.y===foods[i].y){
      score++;
      foods[i]=spawnFood();
      eaten = true;
    }
  }

  if(!eaten) snake.pop();
}

// ---------------- DRAW ----------------
function draw(){

  ctx.fillStyle="#181818";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // grid
  ctx.strokeStyle="#222";
  for(let x=0;x<canvas.width;x+=CELL){
    ctx.beginPath();
    ctx.moveTo(x,0);
    ctx.lineTo(x,canvas.height);
    ctx.stroke();
  }

  for(let y=0;y<canvas.height;y+=CELL){
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(canvas.width,y);
    ctx.stroke();
  }

  // food
  ctx.fillStyle="red";
  foods.forEach(f=>{
    ctx.fillRect(f.x*CELL,f.y*CELL,CELL,CELL);
  });

  // walls
  ctx.fillStyle="dodgerblue";
  walls.forEach(w=>{
    ctx.fillRect(w.x*CELL,w.y*CELL,CELL,CELL);
  });

  // snake
  snake.forEach((s,i)=>{
    ctx.fillStyle = i===0 ? "#00ff9d" : "#00aa66";
    ctx.fillRect(s.x*CELL,s.y*CELL,CELL-2,CELL-2);
  });

  document.getElementById("ui").innerText =
    `Score: ${score} | Mode: ${mode} | Level: ${level} | Food: ${foodCount}`;
}

// ---------------- MENU ----------------
let menuSelect = 0;
let foodIndex = 1;

function drawMenu(){
  ctx.fillStyle="#111";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const modes=["Wrap","Normal","Chaos"];
  const levels=["Easy","Medium","Hard"];

  ctx.fillStyle="white";
  ctx.font="30px Arial";
  ctx.fillText("SNAKE UPGRADE", 200, 80);

  ctx.font="20px Arial";

  let items=[
    `Mode: ${modes[mode-1]}`,
    `Level: ${levels[level-1]}`,
    `Food: ${FOOD_OPTIONS[foodIndex]}`
  ];

  items.forEach((t,i)=>{
    if(i===menuSelect) ctx.fillStyle="yellow";
    else ctx.fillStyle="white";

    ctx.fillText(t, 220, 160+i*50);
  });

  ctx.fillStyle="gray";
  ctx.fillText("ENTER - start | ESC - back", 180, 340);
}

// start
loop();
</script>

</body>
</html>
